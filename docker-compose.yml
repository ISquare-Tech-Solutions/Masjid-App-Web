services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: masjid-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - BACKEND_API_URL=http://masjid-backend-dev:8080
    networks:
      - masjid-app-backend_masjid-network

networks:
  masjid-app-backend_masjid-network:
    external: true
